services:
  - type: web
    name: isecnet-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: isecnet-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

  - type: web
    name: isecnet-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://isecnet-api.onrender.com/api
      - key: VITE_WS_URL
        value: wss://isecnet-api.onrender.com

databases:
  - name: isecnet-db
    plan: free
